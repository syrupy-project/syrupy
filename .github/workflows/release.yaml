name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  VENV: .venv

jobs:
  release:
    name: Release
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_GITHUB_PAT }}

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Determine Release Version
        id: version
        shell: bash
        run: |
          # PEP 440 version from the release tag (vX.Y.Z -> X.Y.Z) or nearest tag on manual runs
          if [[ "${{ github.event_name }}" == "release" ]]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag=$(git describe --tags --abbrev=0)
          fi

          version="${tag#v}"

          commits_since_tag=$(git rev-list --count "${tag}^{commit}..${{ github.sha }}")
          if [[ "$commits_since_tag" -gt 0 ]]; then
            version="${version}.dev${commits_since_tag}"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

          is_dev=false
          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.prerelease }}" == "true" ]]; then
            is_dev=true
          elif [[ "$version" == *".dev"* ]] || [[ "$version" == *"-dev"* ]]; then
            is_dev=true
          fi
          echo "is-dev=$is_dev" >> "$GITHUB_OUTPUT"

      - name: Update the version in the pyproject.toml file
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          uv version "$VERSION"

      - name: Build the package
        shell: bash
        run: |
          uv build

      - name: Update the CHANGELOG.md
        shell: bash
        if: github.event_name == 'release'
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          {
            echo "<!-- MARKER -->"
            echo
            echo "## [${RELEASE_NAME}](${RELEASE_URL}) ($(date +%Y-%m-%d))"
            echo
            printf '%s\n' "$RELEASE_BODY"
          } > .tmp.CHANGELOG.md

          sed -i '/<!-- MARKER -->/{
            r .tmp.CHANGELOG.md
            d
          }' CHANGELOG.md

          rm .tmp.CHANGELOG.md

      - name: Commit the changes
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md pyproject.toml uv.lock
          git commit -m "chore(release): ${VERSION} [skip ci]"

          if [[ "${{ steps.version.outputs.is-dev }}" == "true" ]]; then
            # Just log the contents of the commit
            git show --pretty=format:"%h %s"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            # Release checkouts are detached at the tag; push commit onto the release branch
            branch="${{ github.event.release.target_commitish }}"
            if ! git show-ref --verify --quiet "refs/remotes/origin/${branch}"; then
              branch="${{ github.event.repository.default_branch }}"
            fi
            git push origin "HEAD:${branch}"
          else
            git push
          fi

      - name: Publish (Dev)
        if: steps.version.outputs.is-dev == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish
        if: steps.version.outputs.is-dev == 'false'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
