name: Release

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: Semver bump strategy
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Bump an alpha version, publish to TestPyPI, and create a GitHub prerelease (must run on next)
        required: false
        type: boolean
        default: false

env:
  VENV: .venv

jobs:
  release:
    name: Release
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_GITHUB_PAT }}

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Determine Release Version
        id: version
        shell: bash
        env:
          STRATEGY: ${{ inputs.strategy }}
          PRERELEASE: ${{ inputs.prerelease }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [[ "$PRERELEASE" == "true" ]]; then
            if [[ "$BRANCH" != "next" ]]; then
              echo "::error::Prereleases must be dispatched from the next branch (got ${BRANCH})"
              exit 1
            fi
            uv version --bump "$STRATEGY" --bump alpha
            is_prerelease=true
          else
            if [[ "$BRANCH" != "main" ]]; then
              echo "::error::Stable releases must be dispatched from the main branch (got ${BRANCH})"
              exit 1
            fi
            uv version --bump "$STRATEGY"
            is_prerelease=false
          fi

          version=$(uv version --short)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "is-prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="v${VERSION}" \
            -f target_commitish="${{ github.ref_name }}" \
            --jq .body > .tmp.RELEASE_NOTES.md

      - name: Update the CHANGELOG.md
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          release_name="v${VERSION}"
          release_url="${{ github.server_url }}/${{ github.repository }}/releases/tag/${release_name}"

          {
            echo "<!-- MARKER -->"
            echo
            echo "## [${release_name}](${release_url}) ($(date +%Y-%m-%d))"
            echo
            cat .tmp.RELEASE_NOTES.md
          } > .tmp.CHANGELOG.md

          sed -i '/<!-- MARKER -->/{
            r .tmp.CHANGELOG.md
            d
          }' CHANGELOG.md

          rm .tmp.CHANGELOG.md

      - name: Build the package
        shell: bash
        run: |
          uv build

      - name: Commit the changes
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md pyproject.toml uv.lock
          git commit -m "chore(release): ${VERSION} [skip ci]"
          git push

      - name: Tag and create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          IS_PRERELEASE: ${{ steps.version.outputs.is-prerelease }}
        run: |
          tag="v${VERSION}"
          git tag -a "$tag" -m "chore(release): ${VERSION}"
          git push origin "$tag"

          release_args=(--title "$tag" --notes-file .tmp.RELEASE_NOTES.md)
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          else
            release_args+=(--latest)
          fi

          gh release create "$tag" "${release_args[@]}"

      - name: Publish (Dev)
        if: steps.version.outputs.is-prerelease == 'true'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish
        if: steps.version.outputs.is-prerelease == 'false'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
